<html lang="en">
<head>
<meta charset="UTF-8">
<title>App</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body{
  background:#fffafc;
  font-family: 'Poppins', sans-serif;
}

.card{
  border-radius:24px;
  border:none;
  box-shadow: 0 8px 25px rgba(0,0,0,0.05);
}

.btn-pink{
  background:#ff6f9c;
  color:white;
  border:none;
  border-radius:12px;
}

.hidden{
  display:none;
}
</style>
</head>

<body class="p-3">

<!-- 👤 CUSTOMER -->
<div id="customerPage" class="hidden">

  <h3 class="text-center mb-4">Place Your Order 💕</h3>

  <div class="card p-4 mb-3">

    <input type="text" id="cname" class="form-control mb-2" placeholder="Name">
    <input type="text" id="cphone" class="form-control mb-2" placeholder="Phone">
    <input type="text" id="caddress" class="form-control mb-2" placeholder="Address">

    <textarea id="corder" class="form-control mb-3" placeholder="What do you want?"></textarea>

    <button class="btn btn-pink w-100" onclick="placeOrder()">Submit Order</button>

  </div>

  <button class="btn btn-light w-100" onclick="logout()">Logout</button>
</div>

<!-- 👷 WORKER -->
<div id="workerPage" class="hidden">

  <h3 class="text-center mb-4">Incoming Orders 👷‍♀️</h3>

  <div id="ordersBox"></div>

  <button class="btn btn-light w-100 mt-3" onclick="logout()">Logout</button>
</div>

<script>

let role = localStorage.getItem("role");

if(role === "customer"){
  document.getElementById("customerPage").style.display = "block";
} 
else{
  document.getElementById("workerPage").style.display = "block";
  loadOrders();
}

// place order
function placeOrder(){

  let name = document.getElementById("cname").value;
  let phone = document.getElementById("cphone").value;
  let address = document.getElementById("caddress").value;
  let order = document.getElementById("corder").value;

  let newOrder = {name, phone, address, order};

  let orders = JSON.parse(localStorage.getItem("orders")) || [];
  orders.push(newOrder);

  localStorage.setItem("orders", JSON.stringify(orders));

  alert("Order submitted 💕");
}

// worker loads orders
function loadOrders(){

  let orders = JSON.parse(localStorage.getItem("orders")) || [];
  let box = document.getElementById("ordersBox");

  box.innerHTML = "";

  orders.forEach((o, index) => {

    box.innerHTML += `
      <div class="card p-3 mb-3">
        <h5>${o.name}</h5>
        <p class="mb-1"><b>Phone:</b> ${o.phone}</p>
        <p class="mb-1"><b>Address:</b> ${o.address}</p>
        <p><b>Order:</b> ${o.order}</p>

        <button class="btn btn-pink btn-sm" onclick="done(${index})">Done</button>
      </div>
    `;
  });
}

// remove order
function done(index){
  let orders = JSON.parse(localStorage.getItem("orders")) || [];
  orders.splice(index, 1);
  localStorage.setItem("orders", JSON.stringify(orders));
  loadOrders();
}

// logout
function logout(){
  localStorage.removeItem("role");
  window.location.href = "login.html";
}

</script>

</body>
</html>
